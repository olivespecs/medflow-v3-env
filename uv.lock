version = 1
requires-python = ">=3.10"

[manifest]
members = ["."]

[package]
name = "medical-openenv"
version = "3.0.0"
source = { editable = "." }
dependencies = [
    { name = "fastapi" },
    { name = "uvicorn" },
    { name = "pydantic" },
    { name = "faker" },
    { name = "openenv" },
    { name = "httpx" },
    { name = "gradio" },
    { name = "pandas" },
    { name = "numpy" },
    { name = "fastmcp" },
    { name = "python-dotenv" },
    { name = "openai" },
    { name = "torch" },
    { name = "transformers" },
    { name = "evaluate" },
    { name = "bert-score" },
    { name = "sentence-transformers" },
    { name = "gymnasium" },
    { name = "pytest" },
    { name = "hypothesis" },
]

