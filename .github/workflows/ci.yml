name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Validate OpenEnv specification
        run: python -m openenv.cli.__main__ validate .

      - name: Run test suite
        run: python -m pytest -q