name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run test suite
        run: python -m pytest -q

      - name: Install OpenEnv validator CLI
        run: |
          python -m pip install pipx
      
      - name: Install uv
        run: python -m pip install uv

      - name: Generate uv.lock (CI)
        run: |
          rm -f uv.lock
          python -m uv lock

      - name: Validate OpenEnv specification
        run: python -m pipx run --spec openenv-core openenv validate .